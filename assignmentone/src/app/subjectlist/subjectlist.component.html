<div class="text-center shadow-lg bg-gray-100 rounded-lg px-6 py-12 w-72 mx-10 my-6">
  <h5 class="text-xl font-semibold mb-8">{{subj.name}}</h5>
   <div>
    <button (click)="onEdit()" class="bg-yellow-500 px-2 py-1 rounded mr-2">Edit</button>
    <button (click)="onDelete()" class="bg-red-500 px-2 py-1 rounded">Delete</button>
  </div>
  <a [routerLink]="['/subject', subj.id]" class="bg-gray-900 text-white px-4 py-2 rounded hover:bg-gray-700 transition">
    Watch Videos
  </a>
</div>
