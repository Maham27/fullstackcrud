<h1 class="text-center font-bold text-4xl my-16">SUBJECTS</h1>
<h2>Create Subject</h2>
    <form [formGroup]="subjectForm" (ngSubmit)="onSubmit()">
      <input placeholder="Name" formControlName="name" />
     <button type="submit" [disabled]="subjectForm.invalid">
    {{ editingId ? 'Update' : 'Create' }}
  </button>
    </form>
<div class="sub">
    @for(s of subjs;track s.id){
    <app-subjectlist [subj]="s"
    (edit)="editSubject($event)"
    (delete)="deleteSubject($event)">
    </app-subjectlist>
    }
</div>
