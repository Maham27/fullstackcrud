<h3 class="font-bold text-4xl my-4 text-center my-10">{{subject?.subjectname}}</h3>
<div class="vid mt-4 d-flex flex-row justify-content-evenly">
      @for(video of subject?.videos; track $index){
      <div class="text-center">
            <video width="400" controls>
                  <source [src]="video.url" type="video/mp4" />
            </video>
            <h5 class="text-2xl mt-3">{{video.title}}</h5>
      </div>
      }
</div>
